<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PuzzleCam Admin Gallery</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0b0b12; color:#fff; }
    .wrap { max-width:1100px; margin:auto; padding:20px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    button { background:#6f58ff; color:#fff; border:0; padding:9px 14px; border-radius:8px; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
    .card { background:#171727; border-radius:10px; overflow:hidden; }
    img { width:100%; height:180px; object-fit:cover; display:block; }
    .meta { padding:8px; font-size:12px; color:#b8b8c9; display:flex; justify-content:space-between; gap:8px; }
    a { color:#cfc7ff; text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h2>PuzzleCam Uploaded Photos</h2>
      <button id="refreshBtn">Refresh</button>
    </div>
    <p id="countText">Loading...</p>
    <div id="root"></div>
  </div>

  <script>
    const root = document.getElementById("root");
    const countText = document.getElementById("countText");
    const refreshBtn = document.getElementById("refreshBtn");

    async function loadPhotos() {
      const res = await fetch("/api/photos");
      const data = await res.json();
      const files = data.files || [];
      countText.textContent = `${files.length} image(s)`;

      if (!files.length) {
        root.innerHTML = "<p>No photos yet.</p>";
        return;
      }

      root.innerHTML = `<div class="grid">${
        files.map(f => `
          <div class="card">
            <img src="${f.url}" alt="${f.name}">
            <div class="meta">
              <span>${f.name}</span>
              <a href="${f.url}" target="_blank">open</a>
            </div>
          </div>
        `).join("")
      }</div>`;
    }

    refreshBtn.addEventListener("click", loadPhotos);
    loadPhotos();
  </script>
</body>
</html>
